<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VR Retro Pırpır - Kesin Çekirdek</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000; font-family: sans-serif;
            touch-action: none; user-select: none; -webkit-user-select: none;
        }
        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        
        #vr-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 20, 30, 0.95); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; padding: 20px;
        }
        .vr-start-btn {
            background: #e11d48; color: white; border: none; padding: 16px 32px;
            font-size: 18px; font-weight: bold; border-radius: 30px; cursor: pointer;
            box-shadow: 0 4px 14px rgba(225, 29, 72, 0.4);
        }
        #btn-calibrate {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 999; background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.4);
            color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; display: none;
            backdrop-filter: blur(5px); font-size: 12px;
        }
        #score-board {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 998; color: #ffff00; font-size: 24px; font-weight: bold;
            text-shadow: 2px 2px 0px #000; display: none; pointer-events: none;
            font-family: 'Courier New', Courier, monospace;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/effects/StereoEffect.js"></script>
</head>
<body>

    <div id="vr-overlay">
        <h2>C64 VR PIRPIR UÇAK</h2>
        <p>Lütfen telefonu yatay konuma getirin ve Başlat'a basın.<br>(Sesler otomatik açılacaktır)</p>
        <button class="vr-start-btn" id="btn-start">VR MODUNU BAŞLAT</button>
    </div>

    <div id="score-board">SCORE: 0000</div>
    <button id="btn-calibrate">BAKIŞI SIFIRLA</button>
    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, effect;
        let container = document.getElementById('canvas-container');
        let scoreBoard = document.getElementById('score-board');
        
        // --- ASLA DEĞİŞMEYECEK ÇEKİRDEK QUATERNION & SLERP MİMARİSİ ---
        let rawSensorQuaternion = new THREE.Quaternion(); // Sensörden gelen saf gürültülü veri
        let calibratedTarget = new THREE.Quaternion();    // Kalibrasyon ve eksen düzeltmesi uygulanmış saf hedef
        let currentQuaternion = new THREE.Quaternion();   // Kameraya basılan, slerp ile filtrelenmiş nihai veri
        let sensorBiasQuaternion = new THREE.Quaternion(); // Kalibrasyon ofseti
        
        const SMOOTH_FACTOR = 0.12; // Jitter'ı (atlamayı) tamamen yutan ideal yumuşatma katsayısı

        // Sabit Eksen Dönüşüm Matrisleri (Cihazın uzaydaki yönünü VR standartlarına kilitler)
        const zee = new THREE.Vector3(0, 0, 1);
        const worldTransform = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5)); // -90 derece X ekseni

        // --- RETRO OYUN MEKANİĞİ DEĞİŞKENLERİ ---
        let airplane;             // Arkadan izleyeceğimiz pırpır uçak grubu
        let propeller;            // Dönecek olan pervane objesi
        let rings = [];           // Karşıdan gelecek halkalar dizisi
        let score = 0;
        
        // Hız orijinal tasarıma göre %30 yavaşlatıldı (0.6 -> 0.42)
        const GAME_SPEED = 0.42;    
        const MIN_HEIGHT = 2.0;   // Uçağın inebileceği taban yükseklik
        const MAX_HEIGHT = 16.0;  // Uçağın çıkabileceği tavan yükseklik
        const MAX_SIDE = 6.0;     // Sağ ve sol şerit sınırları

        // --- TARAYICI TABANLI RETRO SES MOTORU (COMMODORE 64 SID SİMÜLASYONU) ---
        let audioCtx, motorOsc, motorGain;

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Kaba C64 Motor Sesi (Square/Kare Dalga Formu)
            motorOsc = audioCtx.createOscillator();
            motorGain = audioCtx.createGain();
            
            motorOsc.type = 'square'; 
            motorOsc.frequency.setValueAtTime(55, audioCtx.currentTime); // 55Hz kaba bas pırpır sesi
            
            motorGain.gain.setValueAtTime(0.07, audioCtx.currentTime); // Kulak sağlığı için düşük tutuldu
            
            motorOsc.connect(motorGain);
            motorGain.connect(audioCtx.destination);
            motorOsc.start();
        }

        function playRetroScoreSound() {
            if(!audioCtx) return;
            // 8-bit Hızlı Arpej Sesi (Halkadan geçince tetiklenen bip-bup efekti)
            let now = audioCtx.currentTime;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(440, now);        // İlk retro nota
            osc.frequency.setValueAtTime(880, now + 0.07); // Hızla yükselen ikinci oktav notası
            
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.22);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(now + 0.22);
        }

        // --- 1. SENSÖR VERİ TOPLAMA (DEĞİŞMEDİ) ---
        function onDeviceOrientation(event) {
            if (event.alpha === null) return;

            const alpha = THREE.MathUtils.degToRad(event.alpha);
            const beta = THREE.MathUtils.degToRad(event.beta);
            const gamma = THREE.MathUtils.degToRad(event.gamma);
            
            rawSensorQuaternion.setFromEuler(new THREE.Euler(beta, alpha, -gamma, 'YXZ'));
        }

        async function requestSensorsPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        window.addEventListener('deviceorientation', onDeviceOrientation, false);
                        return true;
                    }
                    return false;
                } catch (e) { return false; }
            } else {
                window.addEventListener('deviceorientation', onDeviceOrientation, false);
                return true;
            }
        }

        // --- 2. ANA KURULUM ---
        function init() {
            scene = new THREE.Scene();
            // İstenen Değişiklik: Açık mavi gökyüzü ve atmosfer sisi
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.FogExp2(0x87ceeb, 0.012);

            // Kamera Sabitlendi: Uçağın tam arkasında, ileri doğrultuda kilitli
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
            camera.position.set(0, 5, 8); 
            scene.add(camera);

            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                powerPreference: "high-performance", 
                precision: "mediump"
            });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            effect = new THREE.StereoEffect(renderer);
            effect.setEyeSeparation(0.064); 
            effect.setSize(window.innerWidth, window.innerHeight);

            // Çevre Işıkları
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xfffaed, 0.8);
            dirLight.position.set(20, 40, 20);
            scene.add(dirLight);

            // Dünyayı İnşa Et
            createAsphalt();
            createPırpırAirplane();
            spawnInitialRings();

            window.addEventListener('resize', onWindowResize, false);
        }

        // İstenen Değişiklik: Gri Asfalt Yol Mimarisi
        function createAsphalt() {
            const roadGeo = new THREE.PlaneGeometry(16, 1000);
            const roadMat = new THREE.MeshStandardMaterial({ 
                color: 0x444446, // Pürüzsüz gri mat asfalt
                roughness: 0.9
            });
            let asphaltRoad = new THREE.Mesh(roadGeo, roadMat);
            asphaltRoad.rotation.x = -Math.PI / 2; // Yere ser
            asphaltRoad.position.set(0, 0, -400);  // İleriye doğru uzat
            scene.add(asphaltRoad);

            // Beyaz yol çizgileri (Hız algısını korumak için)
            const lineGeo = new THREE.PlaneGeometry(0.3, 1000);
            const lineMat = new THREE.MeshBasicMaterial({ color: 0xeeeeee });
            
            const leftLine = new THREE.Mesh(lineGeo, lineMat);
            leftLine.rotation.x = -Math.PI / 2;
            leftLine.position.set(-7.8, 0.01, -400);
            scene.add(leftLine);

            const rightLine = new THREE.Mesh(lineGeo, lineMat);
            rightLine.rotation.x = -Math.PI / 2;
            rightLine.position.set(7.8, 0.01, -400);
            scene.add(rightLine);
        }

        // İstenen Değişiklik: Arkası Bize Dönük Nostaljik Pırpır Uçak
        function createPırpırAirplane() {
            airplane = new THREE.Group();

            // Ana Sarı Gövde (Kuyruğu arkaya, pervanesi ileriye bakacak şekilde hizalandı)
            const bodyGeo = new THREE.CylinderGeometry(0.5, 0.3, 3.5, 8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xfacc15, flatShading: true }); 
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.rotation.x = -Math.PI / 2; // Negatif rotasyon ile arkası bize döndürüldü
            airplane.add(body);

            // Çift Katlı Turuncu Kanatlar (Biplane Ruhu)
            const wingMat = new THREE.MeshStandardMaterial({ color: 0xea580c, flatShading: true }); 
            const wingGeo = new THREE.BoxGeometry(5.5, 0.08, 0.9);
            
            const bottomWing = new THREE.Mesh(wingGeo, wingMat);
            bottomWing.position.set(0, -0.2, -0.5); // Ön tarafa kaydırıldı (-Z)
            airplane.add(bottomWing);

            const topWing = new THREE.Mesh(wingGeo, wingMat);
            topWing.position.set(0, 0.6, -0.5); 
            airplane.add(topWing);

            // Kanat Direkleri
            const strutGeo = new THREE.BoxGeometry(0.05, 0.8, 0.05);
            const strutMat = new THREE.MeshStandardMaterial({ color: 0x1e293b });
            const leftStrut = new THREE.Mesh(strutGeo, strutMat); leftStrut.position.set(-2.2, 0.2, -0.5); airplane.add(leftStrut);
            const rightStrut = new THREE.Mesh(strutGeo, strutMat); rightStrut.position.set(2.2, 0.2, -0.5); airplane.add(rightStrut);

            // Kuyruk Kanadı (Bize bakan tarafta: +Z)
            const tailGeo = new THREE.BoxGeometry(0.05, 0.7, 0.5);
            const tail = new THREE.Mesh(tailGeo, wingMat);
            tail.position.set(0, 0.4, 1.4); 
            airplane.add(tail);

            // Ön Motor Bloğu
            const motorGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.5, 8);
            const motorMat = new THREE.MeshStandardMaterial({ color: 0x1e293b });
            const motorBlock = new THREE.Mesh(motorGeo, motorMat);
            motorBlock.rotation.x = Math.PI / 2;
            motorBlock.position.z = -1.8; 
            airplane.add(motorBlock);

            // Dönecek Olan Beyaz Pervane
            const propGeo = new THREE.BoxGeometry(1.8, 0.15, 0.04);
            const propMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            propeller = new THREE.Mesh(propGeo, propMat);
            propeller.position.z = -2.1; // En ön burun ucu
            airplane.add(propeller);

            airplane.position.set(0, 4, 0); 
            scene.add(airplane);
        }

        // İstenen Değişiklik: Sağ/Sol/Üst/Alt Çapraz Dağılan Rastgele Halkalar
        function spawnInitialRings() {
            const ringGeo = new THREE.TorusGeometry(1.8, 0.15, 8, 20);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0xff0055, wireframe: true }); 

            for (let i = 0; i < 10; i++) {
                const ring = new THREE.Mesh(ringGeo, ringMat);
                
                // Matris düzleminde tamamen rastgele konumlandırma
                const randomX = (Math.random() - 0.5) * (MAX_SIDE * 2);
                const randomY = MIN_HEIGHT + Math.random() * (MAX_HEIGHT - MIN_HEIGHT);
                
                ring.position.set(randomX, randomY, -60 - (i * 45)); 
                scene.add(ring);
                rings.push(ring);
            }
        }

        // --- 3. JITTER ENGELLEMELİ ANA RENDER DÖNGÜSÜ (CORE KORUNDU) ---
        function animate() {
            requestAnimationFrame(animate);

            // 1. Adım: Telefonun Landscape durumuna göre açıyı al
            const orient = window.orientation ? THREE.MathUtils.degToRad(window.orientation) : 0;
            
            // 2. Adım: Ham sensöre dünya matrisi ve yön düzeltmelerini uygula
            calibratedTarget.copy(rawSensorQuaternion);
            calibratedTarget.multiply(worldTransform);
            calibratedTarget.multiply(new THREE.Quaternion().setFromAxisAngle(zee, -orient));

            // 3. Adım: Kalibrasyon ofsetini ekle
            calibratedTarget.premultiply(sensorBiasQuaternion);

            // 4. Adım: Jitter Engelleme (Slerp)
            currentQuaternion.slerp(calibratedTarget, SMOOTH_FACTOR);
            
            // 5. Adım: Temiz veriyi kameraya yedir (Kamera doğrusal hizada kalır)
            camera.quaternion.copy(currentQuaternion);

            // --- DEĞİŞMEYEN ÇEKİRDEK VERİLERİNDEN HAREKET TÜRETME (YÖN KİLİTLERİ) ---
            const euler = new THREE.Euler().setFromQuaternion(currentQuaternion, 'YXZ');
            
            // Başın dikey eğiminden (X) pürüzsüz yükseklik kontrolü
            let targetHeight = 4 + (euler.x * 12); 
            targetHeight = THREE.MathUtils.clamp(targetHeight, MIN_HEIGHT, MAX_HEIGHT);
            airplane.position.y = THREE.MathUtils.lerp(airplane.position.y, targetHeight, 0.1);

            // Arkadan bakış açısına uyumlu pürüzsüz Sağ-Sol (Y) kayma kontrolü
            let targetSide = euler.y * 10; 
            targetSide = THREE.MathUtils.clamp(targetSide, -MAX_SIDE, MAX_SIDE);
            airplane.position.x = THREE.MathUtils.lerp(airplane.position.x, targetSide, 0.1);

            // Kuyruk ve burun estetik yatış animasyonları
            airplane.rotation.x = (targetHeight - airplane.position.y) * 0.15;
            airplane.rotation.z = (targetSide - airplane.position.x) * 0.2; 
            
            // Pervaneyi döndür
            if(propeller) propeller.rotation.z += 0.4; 

            // C64 Dinamik Motor Sesi: Yükseldikçe retro frekans artsın
            if(motorOsc) {
                motorOsc.frequency.setValueAtTime(52 + (airplane.position.y * 2.5), audioCtx.currentTime);
            }

            // DÜNYAYI VE HALKALARI HAREKET ETTİRME DÖNGÜSÜ
            rings.forEach((ring) => {
                ring.position.z += GAME_SPEED; // Halka uçağa doğru gelir

                // Çarpışma Testi
                if (Math.abs(ring.position.z - airplane.position.z) < GAME_SPEED) {
                    const distToPlane = airplane.position.distanceTo(ring.position);
                    
                    if (distToPlane < 2.3 && ring.visible) { 
                        ring.visible = false;
                        score += 10;
                        scoreBoard.innerText = "SCORE: " + String(score).padStart(4, '0');
                        
                        playRetroScoreSound(); // C64 bip sesini tetikle
                        
                        // Ekran beyaz flaş patlaması
                        scene.background = new THREE.Color(0xffffff);
                        setTimeout(() => { scene.background = new THREE.Color(0x87ceeb); }, 60);
                    }
                }

                // Arkaya geçen halkayı tamamen rastgele koordinatlarla tekrar öne fırlat
                if (ring.position.z > 10) {
                    ring.position.z = -390; 
                    ring.position.x = (Math.random() - 0.5) * (MAX_SIDE * 2); 
                    ring.position.y = MIN_HEIGHT + Math.random() * (MAX_HEIGHT - MIN_HEIGHT); 
                    ring.visible = true;
                }
            });

            // Çift Ekran Stereo VR Render
            effect.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            effect.setSize(window.innerWidth, window.innerHeight);
        }

        // --- 4. ETKİLEŞİM TETİKLEYİCİLERİ ---
        document.getElementById('btn-start').addEventListener('click', async () => {
            const permitted = await requestSensorsPermission();
            if (!permitted) return;

            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(e => console.log(e));
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            }

            document.getElementById('vr-overlay').style.display = 'none';
            document.getElementById('btn-calibrate').style.display = 'block';
            scoreBoard.style.display = 'block';

            init();
            initAudio(); // C64 motor sesini kilitlere takılmadan başlat
            animate();
        });

        // Bakış Sıfırlama
        document.getElementById('btn-calibrate').addEventListener('touchend', (e) => {
            e.preventDefault();
            sensorBiasQuaternion.copy(currentQuaternion).invert();
        });
    </script>
</body>
</html>
