<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VR Pırpır Uçak - Commodore 64 Edition</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000; font-family: sans-serif;
            touch-action: none; user-select: none; -webkit-user-select: none;
        }
        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        
        #vr-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 20, 30, 0.95); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; padding: 20px;
        }
        .vr-start-btn {
            background: #e11d48; color: white; border: none; padding: 16px 32px;
            font-size: 18px; font-weight: bold; border-radius: 30px; cursor: pointer;
            box-shadow: 0 4px 14px rgba(225, 29, 72, 0.4);
        }
        #btn-calibrate {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 999; background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.4);
            color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; display: none;
            backdrop-filter: blur(5px); font-size: 12px;
        }
        #score-board {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 998; color: #ffff00; font-size: 24px; font-weight: bold;
            text-shadow: 2px 2px 0px #000; display: none; pointer-events: none;
            font-family: 'Courier New', Courier, monospace;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/effects/StereoEffect.js"></script>
</head>
<body>

    <div id="vr-overlay">
        <h2>C64 VR PIRPIR UÇAK</h2>
        <p>Lütfen telefonu yatay konuma getirin ve Başlat'a basın.<br>(Sesler otomatik açılacaktır)</p>
        <button class="vr-start-btn" id="btn-start">VR MODUNU BAŞLAT</button>
    </div>

    <div id="score-board">SCORE: 0000</div>
    <button id="btn-calibrate">BAKIŞI SIFIRLA</button>
    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, effect;
        let container = document.getElementById('canvas-container');
        let scoreBoard = document.getElementById('score-board');
        
        // --- ASLA DEĞİŞMEYECEK ÇEKİRDEK QUATERNION & SLERP MİMARİSİ ---
        let rawSensorQuaternion = new THREE.Quaternion(); 
        let calibratedTarget = new THREE.Quaternion();    
        let currentQuaternion = new THREE.Quaternion();   
        let sensorBiasQuaternion = new THREE.Quaternion(); 
        
        const SMOOTH_FACTOR = 0.12; 

        const zee = new THREE.Vector3(0, 0, 1);
        const worldTransform = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5)); 

        // --- OYUN MEKANİĞİ DEĞİŞKENLERİ ---
        let airplane;             
        let propeller;            // Pervane objesi (döndürmek için)
        let rings = [];           
        let score = 0;
        
        // Hız %30 azaltıldı (0.6 * 0.7 = 0.42)
        const GAME_SPEED = 0.42;    
        const MIN_HEIGHT = 2.0;   
        const MAX_HEIGHT = 16.0;  
        const MAX_SIDE = 6.0;     // Sağ-sol rastgelelik sınırı

        // --- SES SENTEZLEYİCİLERİ (8-BIT COMMODORE 64 STİLİ) ---
        let audioCtx, motorOsc, motorGain;

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Retro Motor Sesi (Kaba kare dalga kullanımı)
            motorOsc = audioCtx.createOscillator();
            motorGain = audioCtx.createGain();
            
            motorOsc.type = 'square'; // C64 SID çipi benzeri kaba ses
            motorOsc.frequency.setValueAtTime(55, audioCtx.currentTime); // Düşük pırpır frekansı
            
            motorGain.gain.setValueAtTime(0.08, audioCtx.currentTime); // Kulak tırmalamayacak seviye
            
            motorOsc.connect(motorGain);
            motorGain.connect(audioCtx.destination);
            motorOsc.start();
        }

        function playRetroScoreSound() {
            if(!audioCtx) return;
            // 8-bit Arpej Başarı Sesi (Hızlıca yükselen iki nota)
            let now = audioCtx.currentTime;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(440, now); // La notası
            osc.frequency.setValueAtTime(880, now + 0.08); // Bir oktav üstü
            
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(now + 0.25);
        }

        // --- 1. SENSÖR VERİ TOPLAMA ---
        function onDeviceOrientation(event) {
            if (event.alpha === null) return;
            const alpha = THREE.MathUtils.degToRad(event.alpha);
            const beta = THREE.MathUtils.degToRad(event.beta);
            const gamma = THREE.MathUtils.degToRad(event.gamma);
            rawSensorQuaternion.setFromEuler(new THREE.Euler(beta, alpha, -gamma, 'YXZ'));
        }

        async function requestSensorsPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        window.addEventListener('deviceorientation', onDeviceOrientation, false);
                        return true;
                    }
                    return false;
                } catch (e) { return false; }
            } else {
                window.addEventListener('deviceorientation', onDeviceOrientation, false);
                return true;
            }
        }

        // --- 2. ANA KURULUM ---
        function init() {
            scene = new THREE.Scene();
            // Açık Mavi Gökyüzü ve Atmosfer Sisi
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.FogExp2(0x87ceeb, 0.012);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
            camera.position.set(0, 5, 8); 
            scene.add(camera);

            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                powerPreference: "high-performance",
                precision: "mediump"
            });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            effect = new THREE.StereoEffect(renderer);
            effect.setEyeSeparation(0.064); 
            effect.setSize(window.innerWidth, window.innerHeight);

            // Güneş Işığı etkisi
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xfffaed, 0.8);
            dirLight.position.set(20, 40, 20);
            scene.add(dirLight);

            createAsphalt();
            createPırpırAirplane();
            spawnInitialRings();

            window.addEventListener('resize', onWindowResize, false);
        }

        // Gri Asfalt Yol
        function createAsphalt() {
            const roadGeo = new THREE.PlaneGeometry(16, 1000);
            const roadMat = new THREE.MeshStandardMaterial({ 
                color: 0x444446, // Klasik mat gri asfalt
                roughness: 0.9
            });
            let asphaltRoad = new THREE.Mesh(roadGeo, roadMat);
            asphaltRoad.rotation.x = -Math.PI / 2;
            asphaltRoad.position.set(0, 0, -400);  
            scene.add(asphaltRoad);

            // Retro yol çizgileri
            const lineGeo = new THREE.PlaneGeometry(0.3, 1000);
            const lineMat = new THREE.MeshBasicMaterial({ color: 0xeeeeee });
            
            const leftLine = new THREE.Mesh(lineGeo, lineMat);
            leftLine.rotation.x = -Math.PI / 2;
            leftLine.position.set(-7.8, 0.01, -400);
            scene.add(leftLine);

            const rightLine = new THREE.Mesh(lineGeo, lineMat);
            rightLine.rotation.x = -Math.PI / 2;
            rightLine.position.set(7.8, 0.01, -400);
            scene.add(rightLine);
        }

        // Retro Pırpır Uçak Tasarımı
        function createPırpırAirplane() {
            airplane = new THREE.Group();

            // Ana Gövde (Sarı Nostaljik Gövde)
            const bodyGeo = new THREE.CylinderGeometry(0.5, 0.3, 3.5, 8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xfacc15, flatShading: true }); // Canlı Sarı
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.rotation.x = Math.PI / 2; 
            airplane.add(body);

            // Çift Kanat Yapısı (Biplane - Klasik Pırpır Uçak Ruhu)
            const wingMat = new THREE.MeshStandardMaterial({ color: 0xea580c, flatShading: true }); // Turuncu Kanatlar
            const wingGeo = new THREE.BoxGeometry(5.5, 0.08, 0.9);
            
            const bottomWing = new THREE.Mesh(wingGeo, wingMat);
            bottomWing.position.set(0, -0.2, 0.5);
            airplane.add(bottomWing);

            const topWing = new THREE.Mesh(wingGeo, wingMat);
            topWing.position.set(0, 0.6, 0.5);
            airplane.add(topWing);

            // Kanat Arası Destek Direkleri
            const strutGeo = new THREE.BoxGeometry(0.05, 0.8, 0.05);
            const strutMat = new THREE.MeshStandardMaterial({ color: 0x1e293b });
            const leftStrut = new THREE.Mesh(strutGeo, strutMat); leftStrut.position.set(-2.2, 0.2, 0.5); airplane.add(leftStrut);
            const rightStrut = new THREE.Mesh(strutGeo, strutMat); rightStrut.position.set(2.2, 0.2, 0.5); airplane.add(rightStrut);

            // Kuyruk
            const tailGeo = new THREE.BoxGeometry(0.05, 0.7, 0.5);
            const tail = new THREE.Mesh(tailGeo, wingMat);
            tail.position.set(0, 0.4, -1.4);
            airplane.add(tail);

            // Motor Bloğu (Öndeki Siyah Kısım)
            const motorGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.5, 8);
            const motorMat = new THREE.MeshStandardMaterial({ color: 0x1e293b });
            const motorBloğu = new THREE.Mesh(motorGeo, motorMat);
            motorBloğu.rotation.x = Math.PI / 2;
            motorBloğu.position.z = 1.8;
            airplane.add(motorBloğu);

            // Pervane (Dönecek Olan Parça)
            const propGeo = new THREE.BoxGeometry(1.8, 0.15, 0.04);
            const propMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            propeller = new THREE.Mesh(propGeo, propMat);
            propeller.position.z = 2.1; // Motorun hemen önüne koy
            airplane.add(propeller);

            airplane.position.set(0, 4, 0); 
            scene.add(airplane);
        }

        // Tamamen Rastgele Konumlu Halkalar (Sağ-Sol, Üst-Alt Karma)
        function spawnInitialRings() {
            const ringGeo = new THREE.TorusGeometry(1.8, 0.15, 8, 20);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0xff0055, wireframe: true }); // Belirgin Kırmızı/Pembe neon halka

            for (let i = 0; i < 10; i++) {
                const ring = new THREE.Mesh(ringGeo, ringMat);
                
                // İSTEDİĞİN ÖZELLİK: Sağ, sol, alt, üst tamamen rastgele koordinatlar
                const randomX = (Math.random() - 0.5) * (MAX_SIDE * 2);
                const randomY = MIN_HEIGHT + Math.random() * (MAX_HEIGHT - MIN_HEIGHT);
                
                ring.position.set(randomX, randomY, -60 - (i * 45)); 
                scene.add(ring);
                rings.push(ring);
            }
        }

        // --- 3. JITTER ENGELLEMELİ VE KİLİTLİ RENDER DÖNGÜSÜ ---
        function animate() {
            requestAnimationFrame(animate);

            // 1. ÇEKİRDEK ADIM: Sensör Oryantasyon (Değişmez Güvenli Bölge)
            const orient = window.orientation ? THREE.MathUtils.degToRad(window.orientation) : 0;
            calibratedTarget.copy(rawSensorQuaternion);
            calibratedTarget.multiply(worldTransform);
            calibratedTarget.multiply(new THREE.Quaternion().setFromAxisAngle(zee, -orient));
            calibratedTarget.premultiply(sensorBiasQuaternion);
            currentQuaternion.slerp(calibratedTarget, SMOOTH_FACTOR);

            // 2. ADIM: SADECE DİKEY VE YATAY DEĞERLERİ AYIKLAMA
            const euler = new THREE.Euler().setFromQuaternion(currentQuaternion, 'YXZ');
            
            // Başın dikey hareketinden uçağın YÜKSEKLİĞİNİ türet
            let targetHeight = 4 + (euler.x * 12); 
            targetHeight = THREE.MathUtils.clamp(targetHeight, MIN_HEIGHT, MAX_HEIGHT);
            airplane.position.y = THREE.MathUtils.lerp(airplane.position.y, targetHeight, 0.1);

            // Başın sağa/sola yatmasından ya da dönmesinden uçağın YAN (X) hareketini türet (Hafif ve kontrollü)
            let targetSide = -euler.y * 10;
            targetSide = THREE.MathUtils.clamp(targetSide, -MAX_SIDE, MAX_SIDE);
            airplane.position.x = THREE.MathUtils.lerp(airplane.position.x, targetSide, 0.1);

            // Görsel Detaylar: Uçağın dönüş ve tırmanış açıları, pervanenin dönmesi
            airplane.rotation.x = (targetHeight - airplane.position.y) * 0.15;
            airplane.rotation.z = -(targetSide - airplane.position.x) * 0.2; // Sağa dönerken hafif kanat yatırma efekti
            
            if(propeller) propeller.rotation.z += 0.4; // Pervaneyi deli gibi döndür

            // Dinamik Motor Sesi Simülasyonu: Uçak yükselirken motor zorlansın (pitch artsın)
            if(motorOsc) {
                motorOsc.frequency.setValueAtTime(50 + (airplane.position.y * 3), audioCtx.currentTime);
            }

            // 3. ADIM: HALKALARI YÜRÜTME VE ÇARPIŞMA (KOLİZYON) KONTROLÜ
            rings.forEach((ring) => {
                ring.position.z += GAME_SPEED; 

                // Tam uçağın hizasına geldiğinde 3 boyutlu mesafe kontrolü
                if (Math.abs(ring.position.z - airplane.position.z) < GAME_SPEED) {
                    const distToPlane = airplane.position.distanceTo(ring.position);
                    
                    // Halka yarıçapı ve uçağın gövde toleransı dahilinde içinden geçildi mi?
                    if (distToPlane < 2.3 && ring.visible) { 
                        ring.visible = false;
                        score += 10;
                        scoreBoard.innerText = "SCORE: " + String(score).padStart(4, '0');
                        
                        playRetroScoreSound(); // C64 sesini patlat
                        
                        // Flaş efekti
                        scene.background = new THREE.Color(0xffffff);
                        setTimeout(() => { scene.background = new THREE.Color(0x87ceeb); }, 60);
                    }
                }

                // Arkada kalan halkayı yeni rastgele uzay koordinatlarıyla ileriye ışınla
                if (ring.position.z > 10) {
                    ring.position.z = -390; 
                    ring.position.x = (Math.random() - 0.5) * (MAX_SIDE * 2); // Sağ/Sol tamamen random
                    ring.position.y = MIN_HEIGHT + Math.random() * (MAX_HEIGHT - MIN_HEIGHT); // Alt/Üst tamamen random
                    ring.visible = true;
                }
            });

            effect.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            effect.setSize(window.innerWidth, window.innerHeight);
        }

        // --- 4. ETKİLEŞİM VE BAŞLATMA ---
        document.getElementById('btn-start').addEventListener('click', async () => {
            const permitted = await requestSensorsPermission();
            if (!permitted) {
                alert("Sensör izinleri gerekli.");
                return;
            }

            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(e => console.log(e));
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            }

            document.getElementById('vr-overlay').style.display = 'none';
            document.getElementById('btn-calibrate').style.display = 'block';
            scoreBoard.style.display = 'block';

            init();
            initAudio(); // Ses motorunu tarayıcı kilidine takılmadan başlat
            animate();
        });

        // Bakış Sıfırlama
        document.getElementById('btn-calibrate').addEventListener('touchend', (e) => {
            e.preventDefault();
            sensorBiasQuaternion.copy(currentQuaternion).invert();
        });
    </script>
</body>
</html>
