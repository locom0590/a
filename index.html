<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VR Asfalt Uçuşu - Kesin Çekirdek</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000; font-family: sans-serif;
            touch-action: none; user-select: none; -webkit-user-select: none;
        }
        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        
        #vr-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 15, 0.95); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; padding: 20px;
        }
        .vr-start-btn {
            background: #2563eb; color: white; border: none; padding: 16px 32px;
            font-size: 18px; font-weight: bold; border-radius: 30px; cursor: pointer;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
        }
        #btn-calibrate {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 999; background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.4);
            color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; display: none;
            backdrop-filter: blur(5px); font-size: 12px;
        }
        #score-board {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 998; color: #00ffcc; font-size: 24px; font-weight: bold;
            text-shadow: 0 0 8px rgba(0,255,204,0.6); display: none; pointer-events: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/effects/StereoEffect.js"></script>
</head>
<body>

    <div id="vr-overlay">
        <h2>VR ASFALT UÇUŞU</h2>
        <p>Lütfen telefonu yatay konuma getirin ve Başlat'a basın.</p>
        <button class="vr-start-btn" id="btn-start">VR MODUNU BAŞLAT</button>
    </div>

    <div id="score-board">SKOR: 0</div>
    <button id="btn-calibrate">BAKIŞI SIFIRLA</button>
    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, effect;
        let container = document.getElementById('canvas-container');
        let scoreBoard = document.getElementById('score-board');
        
        // --- ASLA DEĞİŞMEYECEK ÇEKİRDEK QUATERNION & SLERP MİMARİSİ ---
        let rawSensorQuaternion = new THREE.Quaternion(); 
        let calibratedTarget = new THREE.Quaternion();    
        let currentQuaternion = new THREE.Quaternion();   
        let sensorBiasQuaternion = new THREE.Quaternion(); 
        
        const SMOOTH_FACTOR = 0.12; 

        const zee = new THREE.Vector3(0, 0, 1);
        const worldTransform = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5)); 

        // --- OYUN MEKANİĞİ DEĞİŞKENLERİ ---
        let airplane;             // Arkadan gördüğümüz uçak modeli (Grup)
        let asphaltRoad;          // Altımızdaki pürüzsüz asfalt
        let rings = [];           // Bize doğru gelen halkalar
        let score = 0;
        
        const GAME_SPEED = 0.6;    // Asfaltın ve halkaların bize doğru gelme hızı (İlerleme hissi)
        const MIN_HEIGHT = 1.5;   // Uçağın asfalta çarpabileceği minimum yükseklik
        const MAX_HEIGHT = 18.0;  // Uçağın çıkabileceği maksimum yükseklik

        // --- 1. SENSÖR VERİ TOPLAMA (DEĞİŞMEDİ) ---
        function onDeviceOrientation(event) {
            if (event.alpha === null) return;
            const alpha = THREE.MathUtils.degToRad(event.alpha);
            const beta = THREE.MathUtils.degToRad(event.beta);
            const gamma = THREE.MathUtils.degToRad(event.gamma);
            rawSensorQuaternion.setFromEuler(new THREE.Euler(beta, alpha, -gamma, 'YXZ'));
        }

        async function requestSensorsPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        window.addEventListener('deviceorientation', onDeviceOrientation, false);
                        return true;
                    }
                    return false;
                } catch (e) { return false; }
            } else {
                window.addEventListener('deviceorientation', onDeviceOrientation, false);
                return true;
            }
        }

        // --- 2. ANA KURULUM ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0b10);
            scene.fog = new THREE.FogExp2(0x0a0b10, 0.01);

            // Kamera Sabit: Uçağın arkasında ve hafif yukarıda konumlandı
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
            camera.position.set(0, 5, 8); 
            scene.add(camera);

            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                powerPreference: "high-performance",
                precision: "mediump"
            });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            effect = new THREE.StereoEffect(renderer);
            effect.setEyeSeparation(0.064); 
            effect.setSize(window.innerWidth, window.innerHeight);

            // Işıklar
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(0, 30, 10);
            scene.add(dirLight);

            // Nesneleri Oluştur
            createAsphalt();
            createAirplane();
            spawnInitialRings();

            window.addEventListener('resize', onWindowResize, false);
        }

        // Pürüzsüz Asfalt Yol
        function createAsphalt() {
            // Çok uzun bir düzlem oluşturuyoruz (X: Genişlik, Y: Uzunluk)
            const roadGeo = new THREE.PlaneGeometry(16, 1000);
            // Pürüzsüz, parlamayan koyu gri asfalt malzemesi
            const roadMat = new THREE.MeshStandardMaterial({ 
                color: 0x22252a, 
                roughness: 0.8, 
                metalness: 0.1 
            });
            asphaltRoad = new THREE.Mesh(roadGeo, roadMat);
            asphaltRoad.rotation.x = -Math.PI / 2; // Yere yatır
            asphaltRoad.position.set(0, 0, -400);  // İleriye doğru uzat
            scene.add(asphaltRoad);

            // Asfaltın kenarlarına beyaz şeritler (Hız hissini artırmak için)
            const lineGeo = new THREE.PlaneGeometry(0.2, 1000);
            const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            
            const leftLine = new THREE.Mesh(lineGeo, lineMat);
            leftLine.rotation.x = -Math.PI / 2;
            leftLine.position.set(-7.8, 0.01, -400);
            scene.add(leftLine);

            const rightLine = new THREE.Mesh(lineGeo, lineMat);
            rightLine.rotation.x = -Math.PI / 2;
            rightLine.position.set(7.8, 0.01, -400);
            scene.add(rightLine);
        }

        // Arkadan Göreceğimiz Low-Poly Uçak
        function createAirplane() {
            airplane = new THREE.Group();

            // Gövde (Kırmızı fütüristik jet)
            const bodyGeo = new THREE.ConeGeometry(0.6, 3, 4);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xd946ef, flatShading: true }); // Neon Pembe/Kırmızı jet
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.rotation.x = Math.PI / 2; // İleriye doğru baktır
            airplane.add(body);

            // Kanatlar
            const wingGeo = new THREE.BoxGeometry(4, 0.1, 0.8);
            const wingMat = new THREE.MeshStandardMaterial({ color: 0xaa14ba, flatShading: true });
            const wings = new THREE.Mesh(wingGeo, wingMat);
            wings.position.set(0, 0, 0.2);
            airplane.add(wings);

            // Kuyruk
            const tailGeo = new THREE.BoxGeometry(0.1, 0.8, 0.6);
            const tail = new THREE.Mesh(tailGeo, wingMat);
            tail.position.set(0, 0.4, 1);
            airplane.add(tail);

            // Uçağı başlangıç pozisyonuna al (Kameranın önünde, asfaltın üstünde)
            airplane.position.set(0, 3, 0); 
            scene.add(airplane);
        }

        // İlk Halkaları İleride Oluştur
        function spawnInitialRings() {
            const ringGeo = new THREE.TorusGeometry(2, 0.15, 8, 24);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true });

            // Karşıdan gelmesi için ileriye (eksi Z eksenine) diziyoruz
            for (let i = 0; i < 10; i++) {
                const ring = new THREE.Mesh(ringGeo, ringMat);
                // Sadece YÜKSEKLİK (Y) rastgele değişiyor, sağa sola gitmiyor!
                const randomHeight = MIN_HEIGHT + Math.random() * (MAX_HEIGHT - MIN_HEIGHT);
                ring.position.set(0, randomHeight, -60 - (i * 40)); 
                scene.add(ring);
                rings.push(ring);
            }
        }

        // --- 3. JITTER ENGELLEMELİ VE KİLİTLİ RENDER DÖNGÜSÜ ---
        function animate() {
            requestAnimationFrame(animate);

            // 1. ÇEKİRDEK ADIM: Sensör Hesaplamaları (Değişmedi, pürüzsüz)
            const orient = window.orientation ? THREE.MathUtils.degToRad(window.orientation) : 0;
            calibratedTarget.copy(rawSensorQuaternion);
            calibratedTarget.multiply(worldTransform);
            calibratedTarget.multiply(new THREE.Quaternion().setFromAxisAngle(zee, -orient));
            calibratedTarget.premultiply(sensorBiasQuaternion);
            currentQuaternion.slerp(calibratedTarget, SMOOTH_FACTOR);

            // 2. ADIM: SADECE YÜKSEKLİK (PITCH) AYIKLAMA VE KİLİTLEME
            // Filtrelenmiş kuaterniyondan sadece yukarı/aşağı (Euler X) açısını alıyoruz
            const euler = new THREE.Euler().setFromQuaternion(currentQuaternion, 'YXZ');
            
            // Başın yukarı/aşağı eğilme oranına göre uçağın hedef yüksekliğini hesapla
            // euler.x normalde radyan cinsindendir, bunu uçağın dikey hareketine dönüştürüyoruz
            let targetHeight = 3 + (euler.x * 12); 
            
            // Asfaltın altına girmesini veya gökyüzüne uçup gitmesini engelle (Sınırla)
            targetHeight = THREE.MathUtils.clamp(targetHeight, MIN_HEIGHT, MAX_HEIGHT);

            // Uçağın yüksekliğini pürüzsüzce hedef yüksekliğe yaklaştır (Slerp konforunda Lerp)
            airplane.position.y = THREE.MathUtils.lerp(airplane.position.y, targetHeight, 0.1);

            // Görsel etki: Uçak yükselirken burnunu hafif yukarı, inerken aşağı eğsin
            airplane.rotation.x = (targetHeight - airplane.position.y) * 0.2;

            // 3. ADIM: HALKALARI VE ASFALTI HAREKET ETTİRME (İLERLEME HİSSİ)
            // Uçak sabit duruyor, dünya ve halkalar bize doğru akıyor
            rings.forEach((ring) => {
                ring.position.z += GAME_SPEED; // Halkayı uçağa doğru yürüt

                // Uçakla aynı Z hizasına geldiğinde kolizyon (içinden geçme) kontrolü yap
                if (Math.abs(ring.position.z - airplane.position.z) < GAME_SPEED) {
                    // Uçağın yüksekliği ile halkanın yüksekliği uyuşuyor mu?
                    const heightDiff = Math.abs(airplane.position.y - ring.position.y);
                    if (heightDiff < 2.2 && ring.visible) { // Halka yarıçapı kurtarıyor mu?
                        ring.visible = false;
                        score += 10;
                        scoreBoard.innerText = "SKOR: " + score;
                        
                        // Başarı efekti: Ekranı anlık parlat
                        scene.background = new THREE.Color(0x00221c);
                        setTimeout(() => { scene.background = new THREE.Color(0x0a0b10); }, 100);
                    }
                }

                // Halka uçağın arkasında kaldıysa (bizi geçtiyse) ileride yeniden doğur
                if (ring.position.z > 10) {
                    ring.position.z = -360; // Yeniden en ileriye ışınla
                    ring.position.y = MIN_HEIGHT + Math.random() * (MAX_HEIGHT - MIN_HEIGHT); // Yeni rastgele yükseklik
                    ring.visible = true;
                }
            });

            // Sonsuz asfalt hissi için kamerayı veya uçağı döndürmüyoruz, her şey doğrusal akıyor.
            // VR Mercek çift ekran render modu
            effect.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            effect.setSize(window.innerWidth, window.innerHeight);
        }

        // --- 4. ETKİLEŞİM VE BAŞLATMA ---
        document.getElementById('btn-start').addEventListener('click', async () => {
            const permitted = await requestSensorsPermission();
            if (!permitted) {
                alert("Sensör izni gerekiyor.");
                return;
            }

            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(e => console.log(e));
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            }

            document.getElementById('vr-overlay').style.display = 'none';
            document.getElementById('btn-calibrate').style.display = 'block';
            scoreBoard.style.display = 'block';

            init();
            animate();
        });

        // Bakış Sıfırlama
        document.getElementById('btn-calibrate').addEventListener('touchend', (e) => {
            e.preventDefault();
            sensorBiasQuaternion.copy(currentQuaternion).invert();
        });
    </script>
</body>
</html>
