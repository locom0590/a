<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zen VR Biplane - Akışkan & Kısıtlı</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #f0ebd8; font-family: sans-serif;
            touch-action: none; user-select: none; -webkit-user-select: none;
        }
        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        
        #vr-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #f0ebd8 0%, #dddec6 100%); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #293241; text-align: center; padding: 20px;
        }
        .vr-start-btn {
            background: #3d5a80; color: white; border: none; padding: 16px 40px;
            font-size: 18px; font-weight: bold; border-radius: 30px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: all 0.2s;
        }
        .vr-start-btn:active { transform: scale(0.95); }
        
        #btn-calibrate {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 999; background: rgba(61, 90, 128, 0.2); border: 1px solid rgba(61, 90, 128, 0.4);
            color: #3d5a80; padding: 12px 24px; border-radius: 25px; cursor: pointer; display: none;
            backdrop-filter: blur(5px); font-size: 13px; font-weight: bold;
        }

        .ui-container {
            position: absolute; top: 0; width: 50%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: flex-start; align-items: center; box-sizing: border-box;
            padding-top: 5vh; z-index: 5;
        }
        #ui-left { left: 0; border-right: 1px dashed rgba(0,0,0,0.05); }
        #ui-right { left: 50%; }
        
        .hud {
            background: rgba(41, 50, 65, 0.85); padding: 10px 20px; border-radius: 15px;
            color: #fff; font-family: 'Courier New', Courier, monospace; font-size: 14px;
            font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; gap: 15px;
        }
        .fuel-bar-container {
            width: 100px; height: 12px; background: #457b9d; border-radius: 6px;
            overflow: hidden; align-self: center; border: 1px solid #fff;
        }
        .fuel-bar { width: 100%; height: 100%; background: #e63946; }
        
        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: #fff; display: none;
            flex-direction: column; justify-content: center; align-items: center; z-index: 20;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="vr-overlay">
        <h1>ZEN VR BIPLANE</h1>
        <p>Cihazınızı yatay olarak VR Box içine yerleştirin.<br>Başlat düğmesine bastığınız an cihazın duruşu sıfır noktası olarak kilitlenecektir.</p>
        <button class="vr-start-btn" id="btn-start">OYUNU BAŞLAT</button>
    </div>

    <button id="btn-calibrate">BAKIŞI SIFIRLA</button>

    <div id="ui-left" class="ui-container">
        <div class="hud">
            <span>SKOR: <span class="score-val">0</span></span>
            <div class="fuel-bar-container"><div class="fuel-bar"></div></div>
        </div>
    </div>

    <div id="ui-right" class="ui-container">
        <div class="hud">
            <span>SKOR: <span class="score-val">0</span></span>
            <div class="fuel-bar-container"><div class="fuel-bar"></div></div>
        </div>
    </div>

    <div id="game-over">
        <h1 style="color: #e63946;">BENZİN BİTTİ!</h1>
        <p id="final-score">Toplam Skor: 0</p>
        <button class="vr-start-btn" onclick="window.location.reload()">YENİDEN DENE</button>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- DEĞİŞKENLER VE SAHNE YAPILARI ---
        let scene, renderer, leftCamera, rightCamera, wakeLock = null;
        let container = document.getElementById('canvas-container');
        
        let score = 0;
        let fuel = 100;
        let isPlaying = false;
        const speed = 0.36; // %40 azaltılmış pürüzsüz akış hızı (0.6 * 0.6)
        
        let airplaneGroup, propellerBlur, environmentGroup;
        let roadSegments = [], activeElements = [];
        let lastSegmentZ = 0;
        const segmentLength = 100, visibleSegments = 5;

        // --- JIROSROP SENSÖR FÜZYON MATRİSLERİ ---
        let rawSensorQuaternion = new THREE.Quaternion();
        let calibratedTarget = new THREE.Quaternion();   
        let currentQuaternion = new THREE.Quaternion();  
        let sensorBiasQuaternion = new THREE.Quaternion();
        
        const SMOOTH_FACTOR = 0.05; 
        const zee = new THREE.Vector3(0, 0, 1);
        const worldTransform = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5));

        // --- AUDIO SYNTH DEĞİŞKENLERİ ---
        let audioCtx, motorOsc, motorGain, bgmInterval;

        function onDeviceOrientation(event) {
            if (event.alpha === null) return;
            const alpha = THREE.MathUtils.degToRad(event.alpha);
            const beta = THREE.MathUtils.degToRad(event.beta);
            const gamma = THREE.MathUtils.degToRad(event.gamma);
            rawSensorQuaternion.setFromEuler(new THREE.Euler(beta, alpha, -gamma, 'YXZ'));
        }

        async function requestSensorsPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        window.addEventListener('deviceorientation', onDeviceOrientation, false);
                        return true;
                    }
                    return false;
                } catch (e) { return false; }
            } else {
                window.addEventListener('deviceorientation', onDeviceOrientation, false);
                return true;
            }
        }

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) { console.log(err.message); }
        }

        // --- SAHNE KURULUMU ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf0ebd8);
            scene.fog = new THREE.FogExp2(0xf0ebd8, 0.007);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);
            
            leftCamera = new THREE.PerspectiveCamera(60, (window.innerWidth / 2) / window.innerHeight, 0.1, 1000);
            rightCamera = new THREE.PerspectiveCamera(60, (window.innerWidth / 2) / window.innerHeight, 0.1, 1000);
            
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const sunLight = new THREE.DirectionalLight(0xfff3e0, 0.8);
            sunLight.position.set(50, 100, -50);
            sunLight.castShadow = true;
            scene.add(sunLight);

            environmentGroup = new THREE.Group();
            scene.add(environmentGroup);

            for (let i = 0; i < visibleSegments; i++) {
                generateRoadSegment();
            }

            buildBiplane();
            window.addEventListener('resize', onWindowResize, false);
        }

        // --- SONSUZ PROSEDÜREL YOL ---
        function generateRoadSegment() {
            const segmentGroup = new THREE.Group();
            const zPos = lastSegmentZ;

            const groundGeo = new THREE.PlaneGeometry(300, segmentLength);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x94a684, roughness: 0.9 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            segmentGroup.add(ground);

            const sandGeo = new THREE.PlaneGeometry(24, segmentLength);
            const sandMat = new THREE.MeshStandardMaterial({ color: 0xe0ca9b, roughness: 0.8 });
            const sand = new THREE.Mesh(sandGeo, sandMat);
            sand.rotation.x = -Math.PI / 2;
            sand.position.y = 0.01; 
            segmentGroup.add(sand);

            // 10 Birim Genişliğindeki Asfalt Yol (X ekseninde -5 ile +5 arasına denk gelir)
            const roadGeo = new THREE.PlaneGeometry(10, segmentLength);
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x4a4e69, roughness: 0.7 });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            road.position.y = 0.02;
            road.receiveShadow = true;
            segmentGroup.add(road);

            for (let i = -segmentLength/2; i < segmentLength/2; i += 10) {
                const lineGeo = new THREE.PlaneGeometry(0.3, 4);
                const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                const line = new THREE.Mesh(lineGeo, lineMat);
                line.rotation.x = -Math.PI / 2;
                line.position.set(0, 0.03, i + 5);
                segmentGroup.add(line);
            }

            segmentGroup.position.z = zPos - segmentLength / 2;
            environmentGroup.add(segmentGroup);
            roadSegments.push(segmentGroup);

            if (zPos < 0) {
                spawnGameplayElements(zPos);
            }
            lastSegmentZ -= segmentLength;
        }

        function updateInfiniRoad() {
            if (airplaneGroup.position.z < roadSegments[0].position.z - segmentLength) {
                const oldSegment = roadSegments.shift();
                environmentGroup.remove(oldSegment);
                generateRoadSegment();
            }
        }

        // --- LOW-POLY BIPLANE MODELLENMESİ ---
        function buildBiplane() {
            airplaneGroup = new THREE.Group();

            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x3d5a80, roughness: 0.5 });
            const wingMat = new THREE.MeshStandardMaterial({ color: 0xf4f1de, roughness: 0.6 });
            const strutMat = new THREE.MeshStandardMaterial({ color: 0x293241 });
            const glassMat = new THREE.MeshStandardMaterial({ color: 0x1d3557, roughness: 0.1, metalness: 0.9 });
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });

            const fuselageGeo = new THREE.CylinderGeometry(0.5, 0.15, 4, 8);
            fuselageGeo.rotateX(Math.PI / 2);
            const fuselage = new THREE.Mesh(fuselageGeo, bodyMat);
            fuselage.castShadow = true;
            airplaneGroup.add(fuselage);

            const noseGeo = new THREE.ConeGeometry(0.5, 0.8, 8);
            noseGeo.rotateX(-Math.PI / 2);
            const nose = new THREE.Mesh(noseGeo, bodyMat);
            nose.position.z = -2.4;
            airplaneGroup.add(nose);

            const lowerWingGeo = new THREE.BoxGeometry(7, 0.1, 1.2);
            const lowerWing = new THREE.Mesh(lowerWingGeo, wingMat);
            lowerWing.position.set(0, -0.2, -0.4);
            lowerWing.castShadow = true;
            airplaneGroup.add(lowerWing);

            const upperWing = lowerWing.clone();
            upperWing.position.y = 1.3;
            upperWing.position.z = -0.6;
            airplaneGroup.add(upperWing);

            const strutGeo = new THREE.CylinderGeometry(0.04, 0.04, 1.5, 4);
            const positionsX = [-3, -1.5, 1.5, 3];
            positionsX.forEach(x => {
                const strutLeft = new THREE.Mesh(strutGeo, strutMat);
                strutLeft.position.set(x, 0.55, -0.5);
                airplaneGroup.add(strutLeft);
            });

            const tailYawGeo = new THREE.BoxGeometry(0.1, 0.9, 0.6);
            const tailYaw = new THREE.Mesh(tailYawGeo, bodyMat);
            tailYaw.position.set(0, 0.6, 1.8);
            airplaneGroup.add(tailYaw);

            const tailPitchGeo = new THREE.BoxGeometry(1.8, 0.08, 0.5);
            const tailPitch = new THREE.Mesh(tailPitchGeo, wingMat);
            tailPitch.position.set(0, 0.2, 1.8);
            airplaneGroup.add(tailPitch);

            const cockpitGeo = new THREE.BoxGeometry(0.4, 0.3, 0.4);
            const cockpit = new THREE.Mesh(cockpitGeo, glassMat);
            cockpit.position.set(0, 0.5, -0.5);
            airplaneGroup.add(cockpit);

            const wheelGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.15, 8);
            wheelGeo.rotateZ(Math.PI / 2);
            const leftWheel = new THREE.Mesh(wheelGeo, wheelMat);
            leftWheel.position.set(-0.6, -0.8, -1.2);
            const rightWheel = leftWheel.clone();
            rightWheel.position.x = 0.6;
            airplaneGroup.add(leftWheel);
            airplaneGroup.add(rightWheel);

            const blurGeo = new THREE.CylinderGeometry(1.2, 1.2, 0.02, 16);
            blurGeo.rotateX(Math.PI / 2);
            const blurMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.25 });
            propellerBlur = new THREE.Group();
            
            const diskMesh = new THREE.Mesh(blurGeo, blurMat);
            propellerBlur.add(diskMesh);

            const coreLineGeo = new THREE.BoxGeometry(2.2, 0.06, 0.03);
            const coreLineMat = new THREE.MeshBasicMaterial({ color: 0x222222 });
            const coreLine = new THREE.Mesh(coreLineGeo, coreLineMat);
            propellerBlur.add(coreLine);

            propellerBlur.position.z = -2.82;
            airplaneGroup.add(propellerBlur);

            airplaneGroup.scale.set(0.7, 0.7, 0.7);
            airplaneGroup.position.set(0, 5, 0); 
            scene.add(airplaneGroup);
        }

        // --- AKIŞKAN FLIGHT PHYSICS VE SINIRLANDIRMA MANTIĞI ---
        function updateFlightPhysics() {
            if (!isPlaying) return;

            const orient = window.orientation ? THREE.MathUtils.degToRad(window.orientation) : 0;
            calibratedTarget.copy(rawSensorQuaternion);
            calibratedTarget.multiply(worldTransform);
            calibratedTarget.multiply(new THREE.Quaternion().setFromAxisAngle(zee, -orient));
            calibratedTarget.premultiply(sensorBiasQuaternion);

            currentQuaternion.slerp(calibratedTarget, SMOOTH_FACTOR);
            airplaneGroup.quaternion.copy(currentQuaternion);

            const forwardVector = new THREE.Vector3(0, 0, -1).applyQuaternion(airplaneGroup.quaternion);
            airplaneGroup.position.addScaledVector(forwardVector, speed);

            // 1. KISITLAMA: Uçağın asfalt yolun (Genişlik: 10 birim, Sol: -5, Sağ: +5) dışına çıkmasını engelleme
            const roadBoundX = 4.3; // Kanat genişliği ve tolerans payı düşülmüş güvenli X sınırı
            if (airplaneGroup.position.x < -roadBoundX) airplaneGroup.position.x = -roadBoundX;
            if (airplaneGroup.position.x > roadBoundX) airplaneGroup.position.x = roadBoundX;

            // Yükseklik limitleri
            if (airplaneGroup.position.y < 0.8) airplaneGroup.position.y = 0.8;
            if (airplaneGroup.position.y > 40) airplaneGroup.position.y = 40;

            // AKIŞKAN PÜRÜZSÜZ KAMERA TAKİBİ
            const relativeCameraOffset = new THREE.Vector3(0, 1.6, 7.0);
            const cameraOffset = relativeCameraOffset.applyQuaternion(airplaneGroup.quaternion);
            const targetCamPos = airplaneGroup.position.clone().add(cameraOffset);
            
            const ipd = 0.06; 
            const currentIPDOffset = new THREE.Vector3(ipd, 0, 0).applyQuaternion(airplaneGroup.quaternion);
            
            leftCamera.position.lerp(targetCamPos.clone().sub(currentIPDOffset), 0.12);
            rightCamera.position.lerp(targetCamPos.clone().add(currentIPDOffset), 0.12);
            
            const upVector = new THREE.Vector3(0, 1, 0).applyQuaternion(airplaneGroup.quaternion);
            leftCamera.up.copy(upVector);
            rightCamera.up.copy(upVector);
            
            const lookTarget = airplaneGroup.position.clone().add(new THREE.Vector3(0, 0, -2).applyQuaternion(airplaneGroup.quaternion));
            leftCamera.lookAt(lookTarget);
            rightCamera.lookAt(lookTarget);
        }

        // --- OYNANIŞ ELEMENTLERİ (ASFALT HİZASINA GÖRE YERLEŞİM) ---
        function spawnGameplayElements(zCenter) {
            const itemCount = 3;
            for (let i = 0; i < itemCount; i++) {
                const isFuel = Math.random() < 0.25;
                let objGeo, objMat;
                
                if (!isFuel) {
                    objGeo = new THREE.TorusGeometry(1.2, 0.13, 8, 24);
                    objMat = new THREE.MeshStandardMaterial({ color: 0xf95738, emissive: 0xf95738, emissiveIntensity: 0.3 });
                } else {
                    objGeo = new THREE.BoxGeometry(1.0, 1.4, 0.6);
                    objMat = new THREE.MeshStandardMaterial({ color: 0x6a0dad, roughness: 0.4 });
                }

                const mesh = new THREE.Mesh(objGeo, objMat);
                mesh.castShadow = true;

                // Nesneler de tam olarak uçağın uçabileceği asfalt koridorunun (-4.3 ile +4.3 arası) içinde belirir
                const x = (Math.random() - 0.5) * 8.6;
                const y = 2.5 + Math.random() * 12;
                const z = zCenter - (Math.random() * segmentLength);

                mesh.position.set(x, y, z);
                mesh.userData = { isFuel: isFuel, checked: false, radius: isFuel ? 1.0 : 1.4 };

                environmentGroup.add(mesh);
                activeElements.push(mesh);
            }
        }

        function updateGameplay() {
            if (!isPlaying) return;

            fuel -= 0.04;
            if (fuel <= 0) { fuel = 0; endGame(); }

            const bars = document.querySelectorAll('.fuel-bar');
            bars.forEach(bar => bar.style.width = fuel + '%');

            const planePos = airplaneGroup.position;

            for (let i = activeElements.length - 1; i >= 0; i--) {
                const element = activeElements[i];
                const dist = planePos.distanceTo(element.position);

                if (element.position.z > planePos.z + 10 && !element.userData.checked) {
                    element.userData.checked = true;
                    if (!element.userData.isFuel) updateScore(-5);
                }

                if (dist < element.userData.radius + 1.0) {
                    if (element.userData.isFuel) {
                        fuel = Math.min(100, fuel + 30);
                        triggerCoinSound(440, 'square');
                    } else {
                        updateScore(10);
                        triggerCoinSound(880, 'sine');
                    }
                    environmentGroup.remove(element);
                    activeElements.splice(i, 1);
                    continue;
                }

                if (element.position.z > planePos.z + 50) {
                    environmentGroup.remove(element);
                    activeElements.splice(i, 1);
                }
            }
        }

        function updateScore(amount) {
            score += amount;
            if (score < 0) score = 0;
            const scoreTexts = document.querySelectorAll('.score-val');
            scoreTexts.forEach(txt => txt.innerText = score);
        }

        // --- AUDIO ENGINE ---
        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            motorOsc = audioCtx.createOscillator();
            motorGain = audioCtx.createGain();
            motorOsc.type = 'sawtooth';
            motorOsc.frequency.setValueAtTime(65, audioCtx.currentTime);
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(250, audioCtx.currentTime);

            motorGain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            motorOsc.connect(filter);
            filter.connect(motorGain);
            filter.connect(audioCtx.destination);
            motorOsc.start();

            const melody = [146.83, 164.81, 196.00, 220.00, 293.66, 329.63]; 
            let step = 0;

            bgmInterval = setInterval(() => {
                if (!isPlaying) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                const note = melody[step % melody.length] * (step % 3 === 0 ? 1.5 : 1);
                osc.frequency.setValueAtTime(note, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.18);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
                step++;
            }, 150);
        }

        function updateAudioPitch() {
            if (!isPlaying || !motorOsc) return;
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(airplaneGroup.quaternion);
            const pitchFactor = dir.y; 
            const targetFreq = 65 + (pitchFactor * 45);
            motorOsc.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.1);
        }

        function triggerCoinSound(freq, type) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq * 2, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        // --- MAIN LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            if (isPlaying) {
                if (propellerBlur) propellerBlur.rotation.z += 0.8;
                updateFlightPhysics();
                updateInfiniRoad();
                updateGameplay();
                updateAudioPitch();
            }

            const width = window.innerWidth;
            const height = window.innerHeight;

            renderer.setScissorTest(true);

            // Sol Göz
            renderer.setViewport(0, 0, width / 2, height);
            renderer.setScissor(0, 0, width / 2, height);
            renderer.render(scene, leftCamera);

            // Sağ Göz
            renderer.setViewport(width / 2, 0, width / 2, height);
            renderer.setScissor(width / 2, 0, width / 2, height);
            renderer.render(scene, rightCamera);

            renderer.setScissorTest(false);
        }

        function onWindowResize() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            leftCamera.aspect = (width / 2) / height;
            leftCamera.updateProjectionMatrix();
            rightCamera.aspect = (width / 2) / height;
            rightCamera.updateProjectionMatrix();
            renderer.setSize(width, height);
        }

        function endGame() {
            isPlaying = false;
            if (motorOsc) motorOsc.stop();
            clearInterval(bgmInterval);
            document.getElementById('final-score').innerText = "Toplam Skor: " + score;
            document.getElementById('game-over').style.display = 'flex';
        }

        // --- BAŞLATMA VE KALİBRASYON ---
        document.getElementById('btn-start').addEventListener('click', async () => {
            const permitted = await requestSensorsPermission();
            if (!permitted) return;

            initAudio();
            await requestWakeLock();

            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(e => console.log(e));
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            }

            document.getElementById('vr-overlay').style.display = 'none';
            document.getElementById('btn-calibrate').style.display = 'block';

            init();
            sensorBiasQuaternion.copy(currentQuaternion).invert();
            isPlaying = true;
            requestAnimationFrame(animate);
        });

        document.getElementById('btn-calibrate').addEventListener('touchend', (e) => {
            e.preventDefault();
            sensorBiasQuaternion.copy(currentQuaternion).invert();
        });
    </script>
</body>
</html>
